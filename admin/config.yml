  # ── GALLERY ──────────────────────────────────────────────────────────────
  - name: "gallery"
    label: "Gallery"
    files:
      - label: "Gallery Items"
        name: "gallery_items"
        file: "data/gallery.json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.label}} — {{fields.category}}"
            fields:
              - label: "File (Image or Video)"
                name: "file"
                widget: "file"
                hint: "Upload a .jpg/.png/.webp image OR a .mp4/.webm video. Type is detected automatically."

              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - {label: "Cars", value: "cars"}
                  - {label: "Apparel", value: "apparel"}
                  - {label: "Portraits", value: "portraits"}
                  - {label: "Business", value: "business"}

              - label: "Label"
                name: "label"
                widget: "string"
                hint: "Short caption shown on the card (e.g. AI Commercial, Studio Shot)"

              - label: "Poster / Thumbnail (videos only)"
                name: "poster"
                widget: "image"
                required: false
                hint: "Optional: upload a still image to use as the video thumbnail in the grid"
