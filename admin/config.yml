backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "gallery"
    label: "Gallery"
    folder: "gallery"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Category", name: "category", widget: "select", options: ["Automotive", "Apparel", "Business"]}

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Pricing"
        name: "pricing"
        file: "data/pricing.json"
        fields:
          - {label: "Starter Price", name: "starter", widget: "string"}
          - {label: "Pro Price", name: "pro", widget: "string"}
          - {label: "Premium Price", name: "premium", widget: "string"}
