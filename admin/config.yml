          - label: "Stat 1 — Label"
            name: "biz_stat1_label"
            widget: "string"
          - label: "Stat 2 — Number"
            name: "biz_stat2_num"
            widget: "string"
          - label: "Stat 2 — Label"
            name: "biz_stat2_label"
            widget: "string"
          - label: "Stat 3 — Number"
            name: "biz_stat3_num"
            widget: "string"
          - label: "Stat 3 — Label"
            name: "biz_stat3_label"
            widget: "string"
          - label: "Stat 4 — Number"
            name: "biz_stat4_num"
            widget: "string"
          - label: "Stat 4 — Label"
            name: "biz_stat4_label"
            widget: "string"

          - label: "CTA Headline (HTML allowed)"
            name: "biz_cta_h2"
            widget: "string"
          - label: "CTA Paragraph"
            name: "biz_cta_p"
            widget: "text"

          - label: "Package 1 — Tier"
            name: "biz_pkg1_tier"
            widget: "string"
          - label: "Package 1 — Name"
            name: "biz_pkg1_name"
            widget: "string"
          - label: "Package 1 — Price"
            name: "biz_pkg1_price"
            widget: "string"
            hint: "Number only, no $ sign"
          - label: "Package 2 — Tier"
            name: "biz_pkg2_tier"
            widget: "string"
          - label: "Package 2 — Name"
            name: "biz_pkg2_name"
            widget: "string"
          - label: "Package 2 — Price"
            name: "biz_pkg2_price"
            widget: "string"
          - label: "Package 3 — Tier"
            name: "biz_pkg3_tier"
            widget: "string"
          - label: "Package 3 — Name"
            name: "biz_pkg3_name"
            widget: "string"

      # ── PRICING PAGE ──────────────────────────────────────────────────────
      - label: "Pricing Page"
        name: "pricing"
        file: "data/content-pricing.json"
        fields:

          - label: "AI Video — Starter"
            name: "price_vid_ai1"
            widget: "string"
            hint: "Number only, no $ sign (e.g. 600)"
          - label: "AI Video — Pro"
            name: "price_vid_ai2"
            widget: "string"
          - label: "AI Video — Premium"
            name: "price_vid_ai3"
            widget: "string"
          - label: "Real Camera — Standard"
            name: "price_vid_cam1"
            widget: "string"
          - label: "Real Camera — YouTube"
            name: "price_vid_cam2"
            widget: "string"
          - label: "Photos — 15 Photos"
            name: "price_photo1"
            widget: "string"
          - label: "Photos — 30 Photos"
            name: "price_photo2"
            widget: "string"
          - label: "AI Photos — 15 Images"
            name: "price_aiphoto1"
            widget: "string"
          - label: "AI Photos — 30 Images"
            name: "price_aiphoto2"
            widget: "string"
          - label: "Management — Basic /mo"
            name: "price_mgmt1"
            widget: "string"
          - label: "Management — Growth /mo"
            name: "price_mgmt2"
            widget: "string"
          - label: "Management — Authority /mo"
            name: "price_mgmt3"
            widget: "string"
          - label: "Brand Package — Starter /mo"
            name: "price_pkg1"
            widget: "string"
          - label: "Brand Package — Growth /mo"
            name: "price_pkg2"
            widget: "string"
          - label: "Brand Package — Authority /mo"
            name: "price_pkg3"
            widget: "string"

      # ── CONTACT PAGE ──────────────────────────────────────────────────────
      - label: "Contact Page"
        name: "contact"
        file: "data/content-contact.json"
        fields:

          - label: "Email Address"
            name: "contact_email"
            widget: "string"
            hint: "The email shown on the contact page"

          - label: "Instagram Handle"
            name: "contact_instagram"
            widget: "string"
            hint: "Include the @ symbol (e.g. @amd.studioo)"

          - label: "Location"
            name: "contact_location"
            widget: "string"
            hint: "e.g. Orange County, CA"

          - label: "Response Time Message"
            name: "contact_response"
            widget: "text"
            hint: "The paragraph below the contact details about response time"

  # ── GALLERY ───────────────────────────────────────────────────────────────
  - name: "gallery"
    label: "Gallery"
    files:
      - label: "Gallery Items"
        name: "gallery_items"
        file: "data/gallery.json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.label}} — {{fields.category}}"
            fields:
              - label: "File (Image or Video)"
                name: "file"
                widget: "file"
                hint: "Upload a .jpg/.png/.webp image OR a .mp4/.webm video. Type is detected automatically."

              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - {label: "Cars", value: "cars"}
                  - {label: "Apparel", value: "apparel"}
                  - {label: "Portraits", value: "portraits"}
                  - {label: "Business", value: "business"}

              - label: "Label"
                name: "label"
                widget: "string"
                hint: "Short caption shown on the card (e.g. AI Commercial, Studio Shot)"

              - label: "Poster / Thumbnail (videos only)"
                name: "poster"
                widget: "image"
                required: false
                hint: "Optional: upload a still image to use as the video thumbnail in the grid"
