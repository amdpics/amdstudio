    files:
      - label: "Home Page"
        name: "home"
        file: "data/content.json"
        fields:

          # HERO
          - label: "Hero Tag Line"
            name: "hero_tag"
            widget: "string"
            hint: "Small label above the main heading (e.g. AI-Powered Creative Studio)"

          - label: "Hero Title (HTML allowed)"
            name: "hero_title"
            widget: "string"
            hint: "Use <br/> for line breaks and <em>text</em> for blue text"

          - label: "Hero Subtitle"
            name: "hero_subtitle"
            widget: "text"

          - label: "Stat 1 — Number"
            name: "stat1_num"
            widget: "string"
            hint: "Number only (e.g. 10 — the + is added automatically)"

          - label: "Stat 1 — Label"
            name: "stat1_label"
            widget: "string"

          - label: "Stat 2 — Number"
            name: "stat2_num"
            widget: "string"

          - label: "Stat 2 — Label"
