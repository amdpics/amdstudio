backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  # ── SITE CONTENT ─────────────────────────────────────────────────────────
  - name: "site_content"
    label: "Site Content"
    files:

      # ── HOME PAGE ─────────────────────────────────────────────────────────
      - label: "Home Page"
        name: "home"
        file: "data/content-home.json"
        fields:

          # HERO
          - label: "Hero Tag Line"
            name: "hero_tag"
            widget: "string"
            hint: "Small label above the main heading (e.g. AI-Powered Creative Studio)"

          - label: "Hero Title (HTML allowed)"
            name: "hero_title"
            widget: "string"
            hint: "Use <br/> for line breaks and <em>text</em> for blue text"

          - label: "Hero Subtitle"
            name: "hero_subtitle"
            widget: "text"

          - label: "Stat 1 — Number"
            name: "stat1_num"
            widget: "string"
            hint: "Number only (e.g. 10)"

          - label: "Stat 1 — Label"
            name: "stat1_label"
            widget: "string"

          - label: "Stat 2 — Number"
            name: "stat2_num"
            widget: "string"

          - label: "Stat 2 — Label"
            name: "stat2_label"
            widget: "string"

          - label: "Stat 3 — Number"
            name: "stat3_num"
            widget: "string"

          - label: "Stat 3 — Label"
            name: "stat3_label"
            widget: "string"

          # WHO WE WORK WITH
          - label: "Who We Work With — Section Label"
            name: "for_label"
            widget: "string"

          - label: "Who We Work With — Section Title (HTML allowed)"
            name: "for_title"
            widget: "string"
            hint: "Use <br/> for line breaks"

          - label: "Who We Work With — Section Subtitle"
            name: "for_subtitle"
            widget: "text"

          - label: "Card 1 — Image"
            name: "card1_image"
            widget: "image"

          - label: "Card 1 — Title"
            name: "card1_title"
            widget: "string"

          - label: "Card 1 — Description"
            name: "card1_desc"
            widget: "text"

          - label: "Card 2 — Image"
            name: "card2_image"
            widget: "image"

          - label: "Card 2 — Title"
            name: "card2_title"
            widget: "string"

          - label: "Card 2 — Description"
            name: "card2_desc"
            widget: "text"

          - label: "Card 3 — Image"
            name: "card3_image"
            widget: "image"

          - label: "Card 3 — Title"
            name: "card3_title"
            widget: "string"

          - label: "Card 3 — Description"
            name: "card3_desc"
            widget: "text"

          # PROCESS
          - label: "Process — Section Label"
            name: "process_label"
            widget: "string"

          - label: "Process — Section Title (HTML allowed)"
            name: "process_title"
            widget: "string"
            hint: "Use <br/> for line breaks"

          - label: "Step 1 — Title"
            name: "step1_title"
            widget: "string"

          - label: "Step 1 — Description"
            name: "step1_desc"
            widget: "text"

          - label: "Step 2 — Title"
            name: "step2_title"
            widget: "string"

          - label: "Step 2 — Description"
            name: "step2_desc"
            widget: "text"

          - label: "Step 3 — Title"
            name: "step3_title"
            widget: "string"

          - label: "Step 3 — Description"
            name: "step3_desc"
            widget: "text"

          - label: "Step 4 — Title"
            name: "step4_title"
            widget: "string"

          - label: "Step 4 — Description"
            name: "step4_desc"
            widget: "text"

          # BEFORE / AFTER SLIDER
          - label: "Slider — Section Label"
            name: "slider_label"
            widget: "string"

          - label: "Slider — Title"
            name: "slider_title"
            widget: "string"

          - label: "Slider — Subtitle"
            name: "slider_subtitle"
            widget: "text"

          - label: "Slider — Before Image"
            name: "slider_before"
            widget: "image"

          - label: "Slider — After Image"
            name: "slider_after"
            widget: "image"

          # TESTIMONIALS
          - label: "Testimonial 1 — Quote"
            name: "t1_quote"
            widget: "text"

          - label: "Testimonial 1 — Name"
            name: "t1_name"
            widget: "string"

          - label: "Testimonial 1 — Role"
            name: "t1_role"
            widget: "string"

          - label: "Testimonial 1 — Profile Photo"
            name: "t1_avatar"
            widget: "image"
            required: false
            hint: "Optional. If left blank, the reviewer's initial letter will show instead."

          - label: "Testimonial 2 — Quote"
            name: "t2_quote"
            widget: "text"

          - label: "Testimonial 2 — Name"
            name: "t2_name"
            widget: "string"

          - label: "Testimonial 2 — Role"
            name: "t2_role"
            widget: "string"

          - label: "Testimonial 2 — Profile Photo"
            name: "t2_avatar"
            widget: "image"
            required: false
            hint: "Optional. If left blank, the reviewer's initial letter will show instead."

          - label: "Testimonial 3 — Quote"
            name: "t3_quote"
            widget: "text"

          - label: "Testimonial 3 — Name"
            name: "t3_name"
            widget: "string"

          - label: "Testimonial 3 — Role"
            name: "t3_role"
            widget: "string"

          - label: "Testimonial 3 — Profile Photo"
            name: "t3_avatar"
            widget: "image"
            required: false
            hint: "Optional. If left blank, the reviewer's initial letter will show instead."

          # SERVICES SECTION
          - label: "Services — Page Background Image"
            name: "services_bg"
            widget: "image"
            hint: "Full-page background for the Services page. Dark overlay is applied automatically so text stays readable."

          # ABOUT SECTION
          - label: "About — Hero Background Image"
            name: "about_hero_bg"
            widget: "image"
            hint: "Full-width background image for the top of the About page. Dark overlay is applied automatically."

          - label: "About — Section Label"
            name: "about_label"
            widget: "string"

          - label: "About — Headline (HTML allowed)"
            name: "about_headline"
            widget: "string"
            hint: "Use <br/> for line breaks and <em>text</em> for blue text"

          - label: "About — Paragraph 1 (HTML allowed)"
            name: "about_p1"
            widget: "text"
            hint: "Use <strong>text</strong> for bold"

          - label: "About — Paragraph 2 (HTML allowed)"
            name: "about_p2"
            widget: "text"

          - label: "About — Paragraph 3 (HTML allowed)"
            name: "about_p3"
            widget: "text"

          - label: "About — Paragraph 4 (HTML allowed)"
            name: "about_p4"
            widget: "text"

          - label: "About Stat 1 — Number"
            name: "about_stat1_num"
            widget: "string"
            hint: "e.g. 10+"

          - label: "About Stat 1 — Label"
            name: "about_stat1_label"
            widget: "string"

          - label: "About Stat 2 — Number"
            name: "about_stat2_num"
            widget: "string"

          - label: "About Stat 2 — Label"
            name: "about_stat2_label"
            widget: "string"

          - label: "About Stat 3 — Number"
            name: "about_stat3_num"
            widget: "string"

          - label: "About Stat 3 — Label"
            name: "about_stat3_label"
            widget: "string"

          - label: "About Stat 4 — Number"
            name: "about_stat4_num"
            widget: "string"

          - label: "About Stat 4 — Label"
            name: "about_stat4_label"
            widget: "string"

          - label: "Client Logos"
            name: "clients"
            widget: "list"
            label_singular: "Client"
            summary: "{{fields.name}}"
            fields:
              - label: "Brand Name"
                name: "name"
                widget: "string"
              - label: "Logo Image"
                name: "logo"
                widget: "image"
                required: false
                hint: "Upload a PNG or SVG with a transparent background. Logos display grayscale and brighten on hover."

      # ── AUTOMOTIVE PAGE ───────────────────────────────────────────────────
      - label: "Automotive Page"
        name: "automotive"
        file: "data/content-auto.json"
        fields:

          - label: "Hero Background Image"
            name: "auto_hero_bg"
            widget: "image"

          - label: "Hero Title (HTML allowed)"
            name: "auto_hero_title"
            widget: "string"
            hint: "Use <br/> for line breaks and <em>text</em> for blue text"

          - label: "Hero Subtitle"
            name: "auto_hero_sub"
            widget: "text"

          - label: "Overview Heading (HTML allowed)"
            name: "auto_overview_h2"
            widget: "string"

          - label: "Overview Paragraph 1"
            name: "auto_p1"
            widget: "text"

          - label: "Overview Paragraph 2"
            name: "auto_p2"
            widget: "text"

          - label: "Bullet Points"
            name: "auto_bullets"
            widget: "list"
            field: {label: "Bullet", name: "bullet", widget: "string"}

          - label: "Stat 1 — Number"
            name: "auto_stat1_num"
            widget: "string"
          - label: "Stat 1 — Label"
            name: "auto_stat1_label"
            widget: "string"
          - label: "Stat 2 — Number"
            name: "auto_stat2_num"
            widget: "string"
          - label: "Stat 2 — Label"
            name: "auto_stat2_label"
            widget: "string"
          - label: "Stat 3 — Number"
            name: "auto_stat3_num"
            widget: "string"
          - label: "Stat 3 — Label"
            name: "auto_stat3_label"
            widget: "string"
          - label: "Stat 4 — Number"
            name: "auto_stat4_num"
            widget: "string"
          - label: "Stat 4 — Label"
            name: "auto_stat4_label"
            widget: "string"

          - label: "CTA Headline (HTML allowed)"
            name: "auto_cta_h2"
            widget: "string"
          - label: "CTA Paragraph"
            name: "auto_cta_p"
            widget: "text"

          - label: "Package 1 — Tier"
            name: "auto_pkg1_tier"
            widget: "string"
          - label: "Package 1 — Name"
            name: "auto_pkg1_name"
            widget: "string"
          - label: "Package 1 — Price"
            name: "auto_pkg1_price"
            widget: "string"
            hint: "Number only, no $ sign (e.g. 600)"
          - label: "Package 2 — Tier"
            name: "auto_pkg2_tier"
            widget: "string"
          - label: "Package 2 — Name"
            name: "auto_pkg2_name"
            widget: "string"
          - label: "Package 2 — Price"
            name: "auto_pkg2_price"
            widget: "string"
          - label: "Package 3 — Tier"
            name: "auto_pkg3_tier"
            widget: "string"
          - label: "Package 3 — Name"
            name: "auto_pkg3_name"
            widget: "string"
          - label: "Package 3 — Price"
            name: "auto_pkg3_price"
            widget: "string"

      # ── APPAREL PAGE ──────────────────────────────────────────────────────
      - label: "Apparel Page"
        name: "apparel"
        file: "data/content-apparel.json"
        fields:

          - label: "Hero Background Image"
            name: "app_hero_bg"
            widget: "image"
          - label: "Hero Title (HTML allowed)"
            name: "app_hero_title"
            widget: "string"
          - label: "Hero Subtitle"
            name: "app_hero_sub"
            widget: "text"
          - label: "Overview Heading (HTML allowed)"
            name: "app_overview_h2"
            widget: "string"
          - label: "Overview Paragraph 1"
            name: "app_p1"
            widget: "text"
          - label: "Overview Paragraph 2"
            name: "app_p2"
            widget: "text"
          - label: "Bullet Points"
            name: "app_bullets"
            widget: "list"
            field: {label: "Bullet", name: "bullet", widget: "string"}

          - label: "Stat 1 — Number"
            name: "app_stat1_num"
            widget: "string"
          - label: "Stat 1 — Label"
            name: "app_stat1_label"
            widget: "string"
          - label: "Stat 2 — Number"
            name: "app_stat2_num"
            widget: "string"
          - label: "Stat 2 — Label"
            name: "app_stat2_label"
            widget: "string"
          - label: "Stat 3 — Number"
            name: "app_stat3_num"
            widget: "string"
          - label: "Stat 3 — Label"
            name: "app_stat3_label"
            widget: "string"
          - label: "Stat 4 — Number"
            name: "app_stat4_num"
            widget: "string"
          - label: "Stat 4 — Label"
            name: "app_stat4_label"
            widget: "string"

          - label: "CTA Headline (HTML allowed)"
            name: "app_cta_h2"
            widget: "string"
          - label: "CTA Paragraph"
            name: "app_cta_p"
            widget: "text"

          - label: "Package 1 — Tier"
            name: "app_pkg1_tier"
            widget: "string"
          - label: "Package 1 — Name"
            name: "app_pkg1_name"
            widget: "string"
          - label: "Package 1 — Price"
            name: "app_pkg1_price"
            widget: "string"
            hint: "Number only, no $ sign"
          - label: "Package 2 — Tier"
            name: "app_pkg2_tier"
            widget: "string"
          - label: "Package 2 — Name"
            name: "app_pkg2_name"
            widget: "string"
          - label: "Package 2 — Price"
            name: "app_pkg2_price"
            widget: "string"
          - label: "Package 3 — Tier"
            name: "app_pkg3_tier"
            widget: "string"
          - label: "Package 3 — Name"
            name: "app_pkg3_name"
            widget: "string"
          - label: "Package 3 — Price"
            name: "app_pkg3_price"
            widget: "string"

      # ── BUSINESS PAGE ─────────────────────────────────────────────────────
      - label: "Business Page"
        name: "business"
        file: "data/content-biz.json"
        fields:

          - label: "Hero Background Image"
            name: "biz_hero_bg"
            widget: "image"
          - label: "Hero Title (HTML allowed)"
            name: "biz_hero_title"
            widget: "string"
          - label: "Hero Subtitle"
            name: "biz_hero_sub"
            widget: "text"
          - label: "Overview Heading (HTML allowed)"
            name: "biz_overview_h2"
            widget: "string"
          - label: "Overview Paragraph 1"
            name: "biz_p1"
            widget: "text"
          - label: "Overview Paragraph 2"
            name: "biz_p2"
